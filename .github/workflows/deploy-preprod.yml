name: Deploy & Index content
run-name: ${{ github.actor }} is deploying on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - feature/modules

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      environment: preprod
      node_version: 24.13
    secrets: inherit

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: preprod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # - name: Add resource hints in the .htaccess
      #   run: |
      #     cd build
      #     echo "" >> .htaccess
      #     for i in assets/css/*.css ; do echo "Header add Link '</$i>; rel=preload; as=style; fetchpriority=high'" >> .htaccess ; echo "" >> .htaccess ; done
      #     for i in assets/js/*main*.js ; do echo "Header add Link '</$i>; rel=preload; as=script; fetchpriority=high'" >> .htaccess ; echo "" >> .htaccess ; done
      #     for i in assets/fonts/*-{Regular,Bold,SemiBold}*.woff2 ; do echo "Header add Link '</$i>; rel=preload; as=font; type=font/woff2; fetchpriority=high; crossorigin'" >> .htaccess ; echo "" >> .htaccess ; done
      #     echo "" >> .htaccess
      #     cd -

      - name: Get runner's public IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Removing all whitelisted IP
        run: |
          ENDPOINT='frontend/o2switch/o2switch-ssh-whitelist/index.live.php'
          curl -sm 45 -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
          -H 'Accept: application/json' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/${ENDPOINT}?r=remove_all" | grep -q '"status":1'

      - name: Whitelisting the runner IP
        run: |
          ENDPOINT='frontend/o2switch/o2switch-ssh-whitelist/index.live.php'
          curl -sm 45 -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
          -H 'Accept: application/json' \
          -d 'whitelist[address]=${{ steps.ip.outputs.ipv4 }}' \
          -d 'whitelist[port]=22' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/${ENDPOINT}?r=add" | grep -q '"status":1'

      - name: Making sure the IP is whitelisted
        run: |
          ENDPOINT='frontend/o2switch/o2switch-ssh-whitelist/index.live.php'
          curl -sm 45 -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
          -H 'Accept: application/json' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/${ENDPOINT}?r=list" | grep ${{ steps.ip.outputs.ipv4 }}

      - name: Installing the SSH Key
        run: |
          eval $(ssh-agent -s)
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 0400 ~/.ssh/id_rsa

      # Run rsync twice to see if it solves my issue. I have an issue where rsync is hanging randomly.
      # It might be related to the Imunify360 firewall. When this occurs, Imunify seems to be reloading the ipset list.
      # I need to investigate further.
      - name: Sending data with RSYNC
        run: |
          sleep 2
          rsync --timeout=60 -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
          --exclude=".git,.htacces,.htpasswd" -av --delete dist/ \
          ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }}:/home/${{ secrets.CPANEL_USERNAME }}/${{ secrets.CPANEL_PATH }} || true
          sleep 2
          rsync --timeout=60 -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
          --exclude=".git" -av --delete dist/ \
          ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }}:/home/${{ secrets.CPANEL_USERNAME }}/${{ secrets.CPANEL_PATH }}

      - name: Cleaning SSH keys
        if: always()
        run: rm -fr ~/.ssh

      - name: Cleaning artifacts
        uses: geekyeggo/delete-artifact@v5
        if: always()
        with:
          name: dist
          failOnError: false
